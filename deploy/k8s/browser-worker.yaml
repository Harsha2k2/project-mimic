apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimic-browser-worker
  namespace: project-mimic
spec:
  replicas: 4
  selector:
    matchLabels:
      app: mimic-browser-worker
  template:
    metadata:
      labels:
        app: mimic-browser-worker
    spec:
      containers:
        - name: playwright-runtime
          image: ghcr.io/harsha2k2/project-mimic-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7000
          env:
            - name: PORT
              value: "7000"
            - name: PLAYWRIGHT_BROWSERS
              value: "chromium,firefox,webkit"
            - name: PLAYWRIGHT_PRIMARY_BROWSER
              value: "chromium"
            - name: SIDECAR_PORT
              value: "7200"
            - name: SIDECAR_URL
              value: "http://127.0.0.1:7200"
            - name: TRITON_ENDPOINT
              value: http://mimic-triton.project-mimic.svc.cluster.local:8000
            - name: PROXY_GATEWAY
              value: http://mimic-proxy.project-mimic.svc.cluster.local:8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7000
            initialDelaySeconds: 3
            periodSeconds: 10
        - name: mimetic-sidecar
          image: ghcr.io/harsha2k2/project-mimic-mimetic:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SIDECAR_PORT
              value: "7200"
            - name: RUST_LOG
              value: info
          ports:
            - containerPort: 7200
