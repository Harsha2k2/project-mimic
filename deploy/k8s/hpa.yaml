apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mimic-control-plane
  namespace: project-mimic
  annotations:
    scaling.project-mimic.dev/minReplicas: "1"
    scaling.project-mimic.dev/maxReplicas: "6"
    scaling.project-mimic.prod/minReplicas: "4"
    scaling.project-mimic.prod/maxReplicas: "60"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mimic-control-plane
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
