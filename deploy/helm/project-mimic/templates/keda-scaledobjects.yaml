apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mimic-browser-worker-scaler
  namespace: {{ include "project-mimic.namespace" . }}
spec:
  scaleTargetRef:
    name: mimic-browser-worker
  minReplicaCount: {{ .Values.scaling.keda.browserWorker.minReplicaCount }}
  maxReplicaCount: {{ .Values.scaling.keda.browserWorker.maxReplicaCount }}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: pending_browser_sessions
        query: sum(pending_browser_sessions)
        threshold: "{{ .Values.scaling.keda.browserWorker.threshold }}"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mimic-triton-scaler
  namespace: {{ include "project-mimic.namespace" . }}
spec:
  scaleTargetRef:
    name: mimic-triton
  minReplicaCount: {{ .Values.scaling.keda.triton.minReplicaCount }}
  maxReplicaCount: {{ .Values.scaling.keda.triton.maxReplicaCount }}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: triton_inference_queue_depth
        query: sum(triton_inference_queue_depth)
        threshold: "{{ .Values.scaling.keda.triton.threshold }}"
