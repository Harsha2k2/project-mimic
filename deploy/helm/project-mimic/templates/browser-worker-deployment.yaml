apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimic-browser-worker
  namespace: {{ include "project-mimic.namespace" . }}
  labels:
{{ include "project-mimic.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.browserWorker.replicas }}
  selector:
    matchLabels:
      app: mimic-browser-worker
  template:
    metadata:
      labels:
        app: mimic-browser-worker
    spec:
      containers:
        - name: worker
          image: {{ .Values.browserWorker.image }}
          ports:
            - containerPort: {{ .Values.browserWorker.port }}
          env:
            - name: PORT
              value: "{{ .Values.browserWorker.port }}"
            - name: PLAYWRIGHT_BROWSERS
              value: "{{ join \",\" .Values.browserWorker.engines }}"
            - name: PLAYWRIGHT_PRIMARY_BROWSER
              value: "{{ index .Values.browserWorker.engines 0 }}"
            - name: SIDECAR_PORT
              value: "{{ .Values.browserWorker.sidecarPort }}"
            - name: SIDECAR_URL
              value: "http://127.0.0.1:{{ .Values.browserWorker.sidecarPort }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.browserWorker.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.browserWorker.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
        - name: mimetic-sidecar
          image: {{ .Values.browserWorker.sidecarImage }}
          ports:
            - containerPort: {{ .Values.browserWorker.sidecarPort }}
          env:
            - name: SIDECAR_PORT
              value: "{{ .Values.browserWorker.sidecarPort }}"
