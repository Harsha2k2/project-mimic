syntax = "proto3";

package projectmimic.mimetic.v1;

import "proto/common/v1/common.proto";

message PlanPointerRequest {
  projectmimic.common.v1.RequestMeta meta = 1;
  int32 start_x = 2;
  int32 start_y = 3;
  int32 target_x = 4;
  int32 target_y = 5;
}

message MimeticEvent {
  uint32 t_ms = 1;
  string event_type = 2;
  optional double x = 3;
  optional double y = 4;
  optional string key = 5;
}

message EventStreamContract {
  string schema_version = 1;
  string channel = 2;
  string profile = 3;
  optional int32 deterministic_seed = 4;
  repeated MimeticEvent events = 5;
}

message PlanPointerResponse {
  repeated string events_json = 1;
  EventStreamContract event_stream = 2;
}

message EmitPointerRequest {
  projectmimic.common.v1.RequestMeta meta = 1;
  repeated string events_json = 2;
  EventStreamContract event_stream = 3;
}

message PlanKeystrokesRequest {
  projectmimic.common.v1.RequestMeta meta = 1;
  string text = 2;
  string field_type = 3;
}

message PlanKeystrokesResponse {
  repeated string events_json = 1;
  EventStreamContract event_stream = 2;
}

message EmitKeystrokesRequest {
  projectmimic.common.v1.RequestMeta meta = 1;
  repeated string events_json = 2;
  EventStreamContract event_stream = 3;
}

service MimeticService {
  rpc PlanPointer(PlanPointerRequest) returns (PlanPointerResponse);
  rpc EmitPointer(EmitPointerRequest) returns (projectmimic.common.v1.Ack);
  rpc PlanKeystrokes(PlanKeystrokesRequest) returns (PlanKeystrokesResponse);
  rpc EmitKeystrokes(EmitKeystrokesRequest) returns (projectmimic.common.v1.Ack);
}
