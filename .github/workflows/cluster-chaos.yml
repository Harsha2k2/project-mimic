name: cluster-chaos

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  cluster-chaos-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run cluster chaos suite
        run: pytest -q tests/test_cluster_chaos.py tests/test_reliability_chaos.py
