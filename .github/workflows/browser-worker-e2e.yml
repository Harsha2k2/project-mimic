name: browser-worker-e2e

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  browser-worker-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Setup kind
        uses: helm/kind-action@v1.10.0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Create namespace
        run: kubectl create namespace project-mimic

      - name: Install Project Mimic chart
        run: |
          helm install project-mimic deploy/helm/project-mimic \
            --namespace project-mimic \
            --set controlPlane.replicas=1 \
            --set browserWorker.replicas=1 \
            --set triton.replicas=0

      - name: Wait for deployments
        run: |
          kubectl -n project-mimic rollout status deployment/mimic-control-plane --timeout=300s
          kubectl -n project-mimic rollout status deployment/mimic-browser-worker --timeout=300s

      - name: Run integration tests
        run: |
          pytest tests/test_ephemeral_services.py tests/test_mimetic_replay_integration.py -q

      - name: Run cross-browser parity tests
        run: |
          pytest tests/test_browser_worker_cross_engine_parity.py -q