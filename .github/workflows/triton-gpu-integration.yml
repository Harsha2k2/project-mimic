name: triton-gpu-integration

on:
  workflow_dispatch:
  pull_request:

jobs:
  triton-gpu-path:
    runs-on: [self-hosted, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate Triton integration path
        env:
          TRITON_ENDPOINT: http://127.0.0.1:8000
        run: pytest tests/test_ephemeral_services.py tests/test_mimetic_replay_integration.py -q