name: disaster-recovery

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  backup-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate disaster recovery backup
        run: python tools/backup/backup_and_restore.py