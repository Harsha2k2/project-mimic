name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate docs package
        run: python tools/docs/validate_docs.py

  release-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run release automation dry-run
        run: python tools/release/create_release.py 0.0.0-ci --dry-run

  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security scanners
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] semgrep pip-audit

      - name: Run SAST with Semgrep
        run: semgrep --config auto --error --metrics=off src tests tools

      - name: Run dependency CVE scan
        run: pip-audit

      - name: Run container filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            aquasec/trivy:latest \
            fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 /src

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest -q

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path rust/mimetic/Cargo.toml

  baseline-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run deterministic baseline
        run: python inference.py > baseline_output.json

      - name: Validate baseline output shape
        run: |
          python - <<'PY'
          import json

          with open("baseline_output.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          assert "mode" in payload
          assert "average_score" in payload
          assert isinstance(payload.get("results"), list)
          assert len(payload["results"]) == 3
          PY
