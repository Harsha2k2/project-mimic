name: data-deletion

on:
  workflow_dispatch:
    inputs:
      policy_path:
        description: "Path to data deletion policy"
        required: false
        default: config/data-deletion.yml

jobs:
  compliance-safe-deletion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run data deletion workflow
        env:
          DATA_DELETION_POLICY_PATH: ${{ inputs.policy_path }}
        run: python tools/compliance/data_deletion.py