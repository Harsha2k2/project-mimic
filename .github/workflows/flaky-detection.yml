name: flaky-detection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  pull_request:

jobs:
  detect-flaky-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run test pass #1
        continue-on-error: true
        run: pytest --junitxml=.artifacts/junit-pass1.xml

      - name: Run test pass #2
        continue-on-error: true
        run: pytest --junitxml=.artifacts/junit-pass2.xml

      - name: Detect and quarantine flaky tests
        run: |
          python tools/flaky/detect_flaky.py \
            .artifacts/junit-pass1.xml \
            .artifacts/junit-pass2.xml \
            .github/flaky-tests.txt

      - name: Upload flaky report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-tests
          path: |
            .artifacts/junit-pass1.xml
            .artifacts/junit-pass2.xml
            .github/flaky-tests.txt
