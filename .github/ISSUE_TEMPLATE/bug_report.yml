name: Bug Report
description: Report a reproducible defect
title: "bug: "
labels: ["type:bug", "triage:needs-review"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List exact steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
